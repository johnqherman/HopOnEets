name: Deploy relay server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netproto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: netproto/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: test # don't ship a relay that fails typecheck or e2e
    runs-on: ubuntu-latest
    steps:
      - name: Deploy relay server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          script: |
            cd /var/www/hoponeets
            ./netproto/deploy.sh
