version = 0.1.0
author = John Q. Herman
min_framework = 0.18.0
# this mod controls the simulation (FPS / speed / seed) - flags it against native replays/leaderboards
sim = 1
# write each run to Log/hop_on_eets_replay_*.json (read-only, safe)
auto_record = 1
# pin engine RNG seed + deterministic-mode globals during a match (Windows-only; build-specific addresses)
pin_seed = 0
# pinned simulation rate (confirm native rate in M2)
tick_rate = 60
# frames between state-hash samples (M2: switch to sim ticks)
hash_interval = 30
# draw the opponent as a translucent ghost Eets in the level (1/0)
show_ghost = 1
# optional .anim for the ghost (e.g. DATA:Animations/eets/eets.anim); empty = built-in ghost marker
ghost_anim =
# opponent ghost file to race on level load (empty = practice); also loadable from the F6 menu
ghost_file =
# realtime online: connect to a local bridge that relays to the relay server over WebSocket
# (Linux now; Windows online is a follow-up winsock build). Host/join by code or ranked queue in the F6 menu.
online = 0
bridge_host = 127.0.0.1
bridge_port = 38600
player_id = p1
# forced build-phase length in seconds; sim auto-starts when it elapses (0 = no timer)
build_seconds = 15
