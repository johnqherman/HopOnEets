version = 0.3.0
author = John Q. Herman
min_framework = 0.18.0
# this mod controls the simulation (FPS / speed / seed) - flags it against native replays/leaderboards
sim = 1
# write each run to Log/hop_on_eets_replay_*.json (read-only, safe)
auto_record = 1
# pin engine RNG seed + deterministic-mode globals during a match (Windows-only; build-specific addresses)
pin_seed = 0
# pinned simulation rate (confirm native rate in M2)
tick_rate = 60
# frames between state-hash samples (M2: switch to sim ticks)
hash_interval = 30
# draw the opponent as a translucent ghost Eets in the level (1/0)
show_ghost = 1
# .anim drawn as the animated, semi-transparent ghost Eets. Cycle candidates in the F6 menu to match
# your install (the exact name is in the game's Data/Animations/). Empty = built-in marker fallback.
ghost_anim = DATA:Animations/Eets/eets_happy_walk.anim
# opponent ghost file to race on level load (empty = practice); also loadable from the F6 menu
ghost_file =
# realtime online: connect to a local bridge that relays to the relay server over WebSocket.
# Linux + Windows (winsock). Host/join by code or ranked queue in the F6 menu. NOTE: Windows
# auto-loads no level yet (GetLevelManager/LoadSimulatorLevel addrs not RE'd on Win) - load it manually.
online = 0
bridge_host = 127.0.0.1
bridge_port = 38600
player_id = p1
# auto-load the matched level + ready-up automatically on match (0 = load manually from the menu)
auto_load_level = 1
# forced build-phase length in seconds; sim auto-starts when it elapses (0 = no timer)
build_seconds = 15
# ranked pool: intro levels skipped at the start of each hub (World 1 is skipped entirely)
hub_intro_skip = 1
# headless verifier (v0.3): re-simulate this input-log JSON unattended and write a verdict
# (Log/hop_on_eets_verdict.json). Empty = normal interactive mode. See docs/headless-resim.md.
resim_file =
# level index to re-sim (-1 = use the level_index recorded in the log)
resim_level = -1
# exit the process once the verdict is written (1 = batch/headless; 0 = stay open to inspect)
resim_exit = 1
